<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>加载中…</title>
  <link rel="stylesheet" href="index.css" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 16px;
      background: var(--bg-base);
      color: var(--text-primary, #e8e6f0);
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      user-select: none;
      -webkit-app-region: drag;
    }
    img {
      width: 80px;
      height: 80px;
    }
    #status {
      max-width: 320px;
      text-align: center;
      font-size: 13px;
      line-height: 1.4;
      opacity: 0.85;
      min-height: 1.4em;
    }
    #bar {
      width: 220px;
      height: 4px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.12);
      overflow: hidden;
      display: none;
    }
    #bar > i {
      display: block;
      height: 100%;
      width: 0%;
      background: var(--accent, #7c6cf0);
      transition: width 0.25s ease;
    }
  </style>
</head>
<body>
  <img src="config/icon.png" alt="logo" />
  <div id="status"></div>
  <div id="bar"><i></i></div>
  <script>
    window.__setStatus = function (message, percent) {
      var el = document.getElementById('status');
      var bar = document.getElementById('bar');
      var fill = bar && bar.querySelector('i');
      if (el) el.textContent = message || '';
      if (typeof percent === 'number' && percent >= 0) {
        if (bar) bar.style.display = 'block';
        if (fill) fill.style.width = Math.max(0, Math.min(100, percent)) + '%';
      }
    };
  </script>
</body>
</html>
